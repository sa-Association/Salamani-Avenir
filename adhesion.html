<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhésion - Salamani Avenir</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<div class="container nav-container">
    <div class="logo">Salamani Avenir</div>
</div>
</header>

<section class="page-hero">
<div class="container">
    <h1>Devenir membre</h1>
    <p>Rejoignez notre association et participez à nos actions solidaires.</p>
</div>
</section>

<section class="form-section">
<div class="container">

<form class="contact-form">
    <input type="text" placeholder="Nom complet" required>
    <input type="email" placeholder="Adresse email" required>
    <input type="tel" placeholder="Téléphone">
    <textarea placeholder="Pourquoi souhaitez-vous adhérer ?" rows="4"></textarea>
    <button class="btn">Envoyer la demande</button>
</form>

</div>
</section>

<footer>
<div class="container">
    © 2026 Salamani Avenir - Tous droits réservés
</div>
</footer>

</body>
</html>
