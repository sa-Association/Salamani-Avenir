<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhésion - Salamani Avenir</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<div class="container nav-container">
    <div class="logo">Salamani Avenir</div>
</div>
</header>

<section class="page-hero">
<div class="container">
    <h1>Devenir membre</h1>
    <p>Rejoignez notre association et participez à nos actions solidaires.</p>
</div>
</section>

<section class="form-section">
  <div class="form-container">

    <h2>Formulaire d’adhésion</h2>

    <form class="pro-form">

      <div class="form-group">
        <label>Nom complet</label>
        <input type="text" placeholder="Votre nom complet" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Votre email" required>
      </div>

      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" placeholder="Votre numéro">
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="Votre message..." rows="5"></textarea>
      </div>

      <button type="submit" class="btn-submit">
        Envoyer la demande
      </button>

    </form>
  </div>
</section>

<footer>
<div class="container">
    © 2026 Salamani Avenir - Tous droits réservés
</div>
</footer>

</body>

</html>
