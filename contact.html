<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Salamani Avenir</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="header">
<div class="container nav-container">
    <div class="logo">Salamani Avenir</div>
    <div class="menu-toggle" id="menu-toggle">☰</div>
    <button id="dark-mode-toggle" class="dark-btn">🌙</button>
    <nav>
        <ul id="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="a propos.html">À propos</a></li>
            <li><a href="actions.html">Nos Actions</a></li>
            <li><a href="contact.html" class="active btn-nav">Contact</a></li>
        </ul>
    </nav>
</div>
</header>

<section class="page-hero">
<div class="container">
    <h1>Contactez-nous</h1>
    <p>Nous sommes à votre écoute pour toute question ou collaboration.</p>
</div>
</section>

<section class="form-section fade-in">
  <div class="form-container">

    <h2>Contactez-nous</h2>

    <form class="pro-form"
          action="https://formspree.io/f/xykdqqjp"
          method="POST">

      <!-- Protection anti-spam cachée -->
      <input type="text" name="_gotcha" style="display:none">
      <input type="hidden" name="source" value="Contact">
      <div class="input-icon">
        <i class="fa fa-user"></i>
        <input type="text" name="nom" placeholder="Nom complet" required>
      </div>

      <div class="input-icon">
        <i class="fa fa-envelope"></i>
        <input type="email" name="email" placeholder="Email" required>
      </div>

      <div class="input-icon">
        <i class="fa fa-phone"></i>
        <input type="tel" name="telephone" placeholder="Téléphone">
      </div>

      <div class="input-icon textarea-icon">
        <i class="fa fa-comment"></i>
        <textarea name="message" placeholder="Votre message..." rows="5"></textarea>
      </div>

      <button type="submit" class="btn-submit">
        Envoyer la demande
      </button>

      <p class="success-message" id="successMessage">
        ✅ Votre message a été envoyé avec succès !
      </p>

    </form>
  </div>
</section>

<footer>
<div class="container">
© 2026 Salamani Avenir - Tous droits réservés
</div>
</footer>

<script src="script.js"></script>
</body>

</html>
